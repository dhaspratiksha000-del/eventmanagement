<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>
    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
            background-color:#49a5cc;
        }

        h1{
            margin:0;
            padding:20px;
            text-align:center;
            background-color:#54aede;
            color:#f4f5f5;
        }

        .container{
            background-color:#3a8aad;
            text-align:center;
            padding:15px;
        }

        .container a{
            display:inline-block;
            width:120px;
            padding:12px;
            margin:5px;
            text-decoration:none;
            color:rgb(18, 61, 71);
            background-color:#5cb2da;
            border:2px solid white;
            border-radius:5px;
        }

        .container a:hover{
            background-color:#2c7fb8;
        }

        .content{
            padding:20px;
        }

        h2,h3{
            color:black;
        }

        p{
            font-size:18px;
            line-height:1.6;
        }

        ul{
            font-size:18px;
        }

        @media(max-width:700px){

            h1{
                font-size:24px;
            }

            .container a{
                display:block;
                width:80%;
                margin:10px auto;
            }
        }

    </style>
</head>
<body>

<h1 align="center">Contact Us</h1>

<hr>

<h3>Organization Information</h3>

<p>
<b>Organization Name:</b> Event Management System<br><br>

<b>Address:</b> ABC College Road, Pune, Maharashtra<br><br>

<b>Phone:</b> +91 9876543210<br><br>

<b>Email:</b> event@gmail.com
</p>

<hr>

<h3>Contact Form</h3>

<form action="success.html">

Name:<br>
<input type="text"><br><br>

Email:<br>
<input type="email"><br><br>

Message:<br>
<textarea rows="5" cols="30"></textarea>

<br><br>

<input type="submit" value="Send Message">

<input type="reset" value="Reset">

</form>

</body>
</html>

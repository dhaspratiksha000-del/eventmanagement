<!DOCTYPE html>
<html>
<head>
    <title>Registration Successful</title>
    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
            background-color:#49a5cc;

        h1{
            margin:0;
            padding:20px;

        }

        .container{
            background-color:#3a8aad;
            text-align:center;
            padding:15px;
        }

        .container a{
            display:inline-block;
            width:120px;
            padding:12px;

            text-decoration:none;

            background-color:#5cb2da;
            border:2px solid white;
            border-radius:5px;
        }

        .container a:hover{
            background-color:#2c7fb8;
        }

        .content{
            padding:20px;
        }

        h2,h3{
            color:black;
        }

        p{
            font-size:18px;
            line-height:1.6;
        }

        ul{
            font-size:18px;
        }

        @media(max-width:700px){

            h1{
                font-size:24px;
            }

            .container a{
                display:block;
                width:80%;
                margin:10px auto;
            }
